<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرشته</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@200;300&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --night: #080810; --deep: #0D0D1A; --gold: #C9A84C;
            --gold-light: #E8C97A; --cream: #F0EAD6; --muted: #8A8499;
            --glow: rgba(201, 168, 76, 0.15);
        }
        body { background: var(--night); color: var(--cream); font-family: 'Cormorant Garamond', serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-y: auto; }
        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .star { position: absolute; width: 1px; height: 1px; background: var(--cream); border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite; opacity: 0; }
        @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: var(--op); } }
        #password-screen { position: relative; z-index: 10; text-align: center; padding: 2rem; animation: fadeIn 1.5s ease; }
        .farsi-title { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 300; color: var(--gold); letter-spacing: 0.05em; margin-bottom: 0.5rem; direction: rtl; text-shadow: 0 0 40px rgba(201, 168, 76, 0.3); }
        .subtitle { font-size: clamp(0.8rem, 2.5vw, 1rem); color: var(--muted); font-family: 'Inter', sans-serif; font-weight: 200; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 3rem; }
        .divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 1.5rem auto; }
        .password-container { position: relative; display: inline-block; }
        #password-input { background: transparent; border: none; border-bottom: 1px solid rgba(201, 168, 76, 0.3); color: var(--cream); font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 300; text-align: center; padding: 0.8rem 1.5rem; width: 280px; outline: none; letter-spacing: 0.1em; transition: border-color 0.4s ease; }
        #password-input::placeholder { color: var(--muted); font-style: italic; font-size: 1rem; }
        #password-input:focus { border-bottom-color: var(--gold); }
        #enter-btn { display: block; margin: 2rem auto 0; background: transparent; border: 1px solid rgba(201, 168, 76, 0.4); color: var(--gold); font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 200; letter-spacing: 0.4em; text-transform: uppercase; padding: 0.9rem 2.5rem; cursor: pointer; transition: all 0.4s ease; }
        #enter-btn:hover { background: var(--glow); border-color: var(--gold); }
        #error-msg { color: rgba(201, 168, 76, 0.5); font-size: 0.85rem; font-style: italic; margin-top: 1rem; opacity: 0; transition: opacity 0.3s; font-family: 'Inter', sans-serif; font-weight: 200; }
        #main-screen { display: none; position: relative; z-index: 10; text-align: center; padding: 2rem; max-width: 600px; width: 100%; margin: auto; }
        .angel-container { position: relative; height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
        .angel { font-size: 5rem; animation: angelFloat 4s ease-in-out infinite; filter: drop-shadow(0 0 20px rgba(201, 168, 76, 0.4)); opacity: 0; }
        @keyframes angelFloat { 0%, 100% { transform: translateY(0px) rotate(-2deg); } 50% { transform: translateY(-15px) rotate(2deg); } }
        .angel-glow { position: absolute; width: 120px; height: 120px; background: radial-gradient(circle, rgba(201, 168, 76, 0.08) 0%, transparent 70%); border-radius: 50%; animation: glowPulse 4s ease-in-out infinite; }
        @keyframes glowPulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; } }
        .farsi-header { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 300; color: var(--gold); direction: rtl; letter-spacing: 0.05em; margin-bottom: 0.3rem; opacity: 0; text-shadow: 0 0 30px rgba(201, 168, 76, 0.25); }
        .farsi-meaning { font-size: 0.85rem; color: var(--muted); font-family: 'Inter', sans-serif; font-weight: 200; letter-spacing: 0.25em; text-transform: uppercase; opacity: 0; margin-bottom: 2.5rem; }
        .message-block { opacity: 0; margin: 1.5rem 0; }
        .message-tr { font-size: clamp(1.1rem, 3vw, 1.4rem); font-weight: 300; color: var(--cream); line-height: 1.8; font-style: italic; }
        .message-tr span { display: block; margin-top: 0.5rem; }
        .message-fa { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(201, 168, 76, 0.15); }
        .message-fa-text { font-size: clamp(1.3rem, 4vw, 1.8rem); font-weight: 300; color: var(--gold-light); direction: rtl; line-height: 1.8; margin-bottom: 0.8rem; }
        .message-fa-meaning { font-size: 0.8rem; color: var(--muted); font-family: 'Inter', sans-serif; font-weight: 200; font-style: italic; letter-spacing: 0.2em; }
        .ai-message-block { opacity: 0; margin-top: 2.5rem; padding-top: 2rem; padding-bottom: 3rem; border-top: 1px solid rgba(201, 168, 76, 0.1); }
        .ai-label { font-size: 0.7rem; color: rgba(201, 168, 76, 0.4); font-family: 'Inter', sans-serif; font-weight: 200; letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 1.2rem; }
        .ai-tr { font-size: clamp(1rem, 2.5vw, 1.2rem); font-weight: 300; color: var(--cream); line-height: 1.8; font-style: italic; margin-bottom: 1.2rem; }
        .ai-fa { font-size: clamp(1.1rem, 3vw, 1.5rem); color: var(--gold-light); direction: rtl; line-height: 1.8; margin-bottom: 0.5rem; }
        .ai-anlam { font-size: 0.78rem; color: var(--muted); font-family: 'Inter', sans-serif; font-weight: 200; font-style: italic; letter-spacing: 0.15em; }
        .loading-dots { display: inline-flex; gap: 6px; align-items: center; }
        .loading-dots span { width: 4px; height: 4px; background: var(--gold); border-radius: 50%; animation: dotPulse 1.4s ease-in-out infinite; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .sparkle { position: fixed; pointer-events: none; z-index: 5; font-size: 0.8rem; animation: sparkleFly 2s ease forwards; opacity: 0; }
        @keyframes sparkleFly { 0% { opacity: 0; transform: translateY(0) scale(0); } 30% { opacity: 1; transform: translateY(-20px) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(0.5); } }
    </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div id="password-screen">
    <div class="farsi-title">فرشته</div>
    <div class="subtitle">Bir şeyler seni bekliyor</div>
    <div class="divider"></div>
    <div class="password-container">
        <input type="text" id="password-input" placeholder="şifreni gir..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button id="enter-btn">Gir</button>
    <div id="error-msg">Yanlış şifre...</div>
</div>
<div id="main-screen">
    <div class="angel-container">
        <div class="angel-glow"></div>
        <div class="angel" id="angel">🕊️</div>
    </div>
    <div class="farsi-header" id="farsi-header">فرشته</div>
    <div class="farsi-meaning" id="farsi-meaning">Fereshteh · Melek</div>
    <div class="divider"></div>
    <div class="message-block" id="msg1">
        <div class="message-tr">
            Bazı insanlar hayatına girer, fark etmeden her şeyi değiştirir.
            <span>Sen de öylesin.</span>
        </div>
    </div>
    <div class="message-block" id="msg2">
        <div class="message-fa">
            <div class="message-fa-text">فرشته‌ای که نمی‌دانست فرشته است</div>
            <div class="message-fa-meaning">melek olduğunu bilmeyen melek</div>
        </div>
    </div>
    <div class="message-block" id="msg3">
        <div class="message-tr">Seninle geçen her an, farkında bile olmadan aklımda kalıyor.</div>
    </div>
    <div class="divider" id="divider2" style="opacity:0; margin: 2rem auto;"></div>
    <div class="ai-message-block" id="ai-block">
        <div class="ai-label">✦ bu an için</div>
        <div id="ai-content">
            <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
    </div>
</div>
<script>
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
        star.style.setProperty('--op', (0.2 + Math.random() * 0.6).toString());
        star.style.animationDelay = Math.random() * 4 + 's';
        const size = 1 + Math.random() * 1.5;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        starsContainer.appendChild(star);
    }

    function createSparkle(x, y) {
        const sparkles = ['✦', '✧', '·', '⋆', '˚'];
        for (let i = 0; i < 4; i++) {
            setTimeout(() => {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
                s.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
                s.style.top = (y + (Math.random() - 0.5) * 60) + 'px';
                s.style.color = '#C9A84C';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 2000);
            }, i * 150);
        }
    }

    document.addEventListener('click', (e) => {
        if (document.getElementById('main-screen').style.display === 'block') {
            createSparkle(e.clientX, e.clientY);
        }
    });

    async function checkPassword() {
        const input = document.getElementById('password-input').value.trim();
        try {
            const res = await fetch('/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: input })
            });
            const data = await res.json();
            if (data.success) {
                showMainScreen();
            } else {
                const errMsg = document.getElementById('error-msg');
                errMsg.style.opacity = '1';
                document.getElementById('password-input').style.borderBottomColor = 'rgba(201,168,76,0.2)';
                setTimeout(() => {
                    errMsg.style.opacity = '0';
                    document.getElementById('password-input').style.borderBottomColor = 'rgba(201,168,76,0.3)';
                }, 2000);
            }
        } catch(e) { console.error(e); }
    }

    document.getElementById('enter-btn').addEventListener('click', checkPassword);
    document.getElementById('password-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPassword();
    });

    function showMainScreen() {
        const pw = document.getElementById('password-screen');
        pw.style.transition = 'opacity 1s ease';
        pw.style.opacity = '0';
        setTimeout(() => {
            pw.style.display = 'none';
            const main = document.getElementById('main-screen');
            main.style.display = 'block';
            runSequence();
        }, 1000);
    }

    function animateEl(el, delay, duration = 1200) {
        return new Promise(resolve => {
            setTimeout(() => {
                el.style.transition = `opacity ${duration}ms ease, transform ${duration}ms ease`;
                el.style.transform = 'translateY(20px)';
                el.style.opacity = '0';
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        el.style.transform = 'translateY(0)';
                        el.style.opacity = '1';
                        setTimeout(resolve, duration);
                    }, 50);
                });
            }, delay);
        });
    }

    async function runSequence() {
        const angel = document.getElementById('angel');
        const farsiHeader = document.getElementById('farsi-header');
        const farsiMeaning = document.getElementById('farsi-meaning');
        const msg1 = document.getElementById('msg1');
        const msg2 = document.getElementById('msg2');
        const msg3 = document.getElementById('msg3');
        const divider2 = document.getElementById('divider2');
        const aiBlock = document.getElementById('ai-block');

        setTimeout(() => { angel.style.transition = 'opacity 2s ease'; angel.style.opacity = '1'; }, 300);
        await animateEl(farsiHeader, 800);
        await animateEl(farsiMeaning, 200);
        await animateEl(msg1, 600);
        await animateEl(msg2, 800);
        await animateEl(msg3, 800);
        setTimeout(() => { divider2.style.transition = 'opacity 1s ease'; divider2.style.opacity = '1'; }, 500);
        await animateEl(aiBlock, 800);
        fetchAIMessage();
    }

    async function fetchAIMessage() {
        try {
            const res = await fetch('/get_message?t=' + Date.now());
            const data = await res.json();
            if (data.success) {
                const content = document.getElementById('ai-content');
                content.style.transition = 'opacity 0.5s ease';
                content.style.opacity = '0';
                setTimeout(() => {
                    content.innerHTML = `
                        <div class="ai-tr">${data.tr}</div>
                        <div class="ai-fa">${data.fa}</div>
                        <div class="ai-anlam">${data.anlam}</div>
                    `;
                    content.style.opacity = '1';
                }, 500);
            }
        } catch(e) {
            document.getElementById('ai-content').innerHTML = `
                <div class="ai-tr">Her bakışında farklı bir dünya görüyorum.</div>
                <div class="ai-fa">تو آرامشی هستی که انتظارش را نداشتم</div>
                <div class="ai-anlam">sen beklenmediğim bir huzursun</div>
            `;
        }
    }
</script>
</body>
</html>
